# API + ストレージを単一ドメインで管理 (api.tierin.f5.si)
upstream api_backend {
    server api:3000;
}

# HTTP -> HTTPS (APIドメイン)
server {
    listen 80;
    server_name api.tierin.f5.si;
    return 301 https://api.tierin.f5.si$request_uri;
}

# 旧ストレージドメインは単一ドメインの /storage 配下へ誘導
server {
    listen 80;
    server_name storage.tierin.f5.si;
    return 301 https://api.tierin.f5.si/storage$request_uri;
}

# API + Storage HTTPS (単一ドメイン)
server {
    listen 443 ssl;
    server_name api.tierin.f5.si;

    # Cloudflare Origin証明書
    ssl_certificate /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location = / {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # /api 末尾スラッシュなしを正規化
    location = /api {
        return 301 /api/;
    }

    # CORS設定はAPI側(Hono)で処理する
    location /api/ {
        proxy_pass http://api_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # /storage 末尾スラッシュなしを正規化
    location = /storage {
        return 301 /storage/;
    }

    # ストレージ配信 (/storage/** -> /data/**)
    location /storage/ {
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        alias /data/;
        autoindex on;
    }

    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}

# 旧ストレージドメイン(HTTPS)も単一ドメインへリダイレクト
server {
    listen 443 ssl;
    server_name storage.tierin.f5.si;

    ssl_certificate /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://api.tierin.f5.si/storage$request_uri;
}