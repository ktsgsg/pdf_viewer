# API + ストレージを単一ドメインで管理 (api.tierin.f5.si)
upstream api_backend {
    server api:3000;
}

# HTTP -> HTTPS (APIドメイン)
server {
    listen 80;
    server_name api.tierin.f5.si;
    return 301 https://api.tierin.f5.si$request_uri;
}

# 旧ストレージドメインは単一ドメインの /storage 配下へ誘導
server {
    listen 80;
    server_name storage.tierin.f5.si;
    return 301 https://api.tierin.f5.si/storage$request_uri;
}

# API + Storage HTTPS (単一ドメイン)
server {
    listen 443 ssl;
    server_name api.tierin.f5.si;

    # Cloudflare Origin証明書
    ssl_certificate /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    auth_basic "Restricted";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location = / {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # /api 末尾スラッシュなしを正規化
    location = /api {
        return 301 /api/;
    }

    # Basic認証を維持しつつ、APIプリフライトはNginxで応答
    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_pass http://api_backend/;
    }

    # /storage 末尾スラッシュなしを正規化
    location = /storage {
        return 301 /storage/;
    }

    # ストレージ配信 (/storage/** -> /data/**)
    location /storage/ {
        alias /data/;
        autoindex on;
    }

    location /health {
        auth_basic off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}

# 旧ストレージドメイン(HTTPS)も単一ドメインへリダイレクト
server {
    listen 443 ssl;
    server_name storage.tierin.f5.si;

    ssl_certificate /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://api.tierin.f5.si/storage$request_uri;
}